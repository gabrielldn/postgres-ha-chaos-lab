global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: patroni
    metrics_path: /metrics
    static_configs:
      - targets:
          - pg1:8008
          - pg2:8008
          - pg3:8008

  - job_name: postgres_exporters
    static_configs:
      - targets:
          - postgres-exporter-pg1:9187
          - postgres-exporter-pg2:9187
          - postgres-exporter-pg3:9187

  - job_name: node_exporter
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: pgbackrest_exporter
    static_configs:
      - targets:
          - pgbackrest-exporter:9188
