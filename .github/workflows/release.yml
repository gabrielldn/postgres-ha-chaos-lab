name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/postgres-ha-chaos-lab-pg
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build and push postgres-patroni image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/postgres-patroni/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Prepare release assets
        run: |
          mkdir -p dist
          cp docs/examples/SUMMARY.example.md dist/SUMMARY.example.md
          cp compose/images.lock.env dist/images.lock.env
          echo "${{ steps.build.outputs.digest }}" > dist/postgres-patroni.digest.txt
          {
            echo "image=ghcr.io/${{ github.repository_owner }}/postgres-ha-chaos-lab-pg"
            echo "tags<<EOF"
            echo "${{ steps.meta.outputs.tags }}"
            echo "EOF"
          } > dist/package.txt

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/SUMMARY.example.md
            dist/images.lock.env
            dist/postgres-patroni.digest.txt
            dist/package.txt
          body: |
            ## Assets
            - `SUMMARY.example.md`: evidence pack de referência.
            - `images.lock.env`: lock das imagens externas do lab.
            - `postgres-patroni.digest.txt`: digest da imagem publicada no GHCR.

            ## GHCR package
            `ghcr.io/${{ github.repository_owner }}/postgres-ha-chaos-lab-pg`
