name: smoke

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          python -m pip install --upgrade pip
          python -m pip install yamllint

      - name: Run smoke checks
        run: make ci-smoke

      - name: Run sanity coverage
        run: make test-sanity-cov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: artifacts/coverage/coverage.xml

  e2e:
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start lab
        run: |
          make up
          make init

      - name: Run E2E tests
        run: make test

      - name: Diagnostics on failure
        if: failure()
        run: |
          make ps || true
          make logs || true

      - name: Teardown
        if: always()
        run: make down || true
